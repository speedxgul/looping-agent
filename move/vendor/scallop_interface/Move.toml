# Build-time interface for Scallop's lending package (`ScallopProtocol`, mainnet addr
# 0xefe8b36d5b2e43728cc323298626b83177803521d195cfb11e15b910e892fddf). Mirrors ONLY the
# public `mint`/`redeem` signatures + the `Version`/`Market`/`MarketCoin` types our adapter
# uses, with `abort` bodies — never published. Verified against the real source
# (github.com/scallop-io/sui-lending-protocol, contracts/protocol/sources). At mainnet
# publish the `protocol` address resolves to the real Scallop package.
[package]
name = "scallop_interface"
edition = "2024"

[addresses]
protocol = "0x0"
