# Phase A — zero-code proof: deploy Marlin's prebuilt echo server, attest, verify.
# Swap to the custom image (commented below) for Phase B once you've pushed it.
services:
  app:
    image: marlinorg/oyster-cvm-tutorials-echo-server:latest
    init: true
    network_mode: host
    restart: unless-stopped

