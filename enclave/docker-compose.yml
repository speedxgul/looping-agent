# Deploys the treasury enclave SIGNING service (enclave/app) on Oyster.
# Build + push the image first (see README "Deploy the signing service"), then
# replace <your-dockerhub-user> below. The signing service listens on :8080;
# Oyster's blue enclave image serves the attestation on :1300 automatically.
services:
  app:
    image: docker.io/<your-dockerhub-user>/treasury-enclave:latest
    init: true
    network_mode: host
    restart: unless-stopped
    # In a real run, provision the secp256k1 key via Seal instead of a plaintext env.
    # For a first end-to-end test you can pin the dev key:
    # environment:
    #   - ENCLAVE_PRIVATE_KEY=1111111111111111111111111111111111111111111111111111111111111111
